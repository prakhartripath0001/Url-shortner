spring.application.name=payment-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─── MySQL ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ─── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-this-secret-in-production-must-be-at-least-32-chars}

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8086}

# ─── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ─── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Razorpay Configuration ────────────────────────────────────────────────────
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_change_me}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:change_me_secret}

# ─── Kafka Topics ──────────────────────────────────────────────────────────────
app.kafka.topics.payment-success=payment.success

# ─── Plan Configuration ────────────────────────────────────────────────────────
# Maps plan enum names to price (in paise) and details
plans.pro.price-in-paise=49900
plans.pro.name=Pro Plan
plans.pro.description=Advanced analytics, custom aliases, QR codes, and 1000 short URLs/mo.

plans.business.price-in-paise=99900
plans.business.name=Business Plan
plans.business.description=Unlimited URLs, team collaboration, dedicated support, and custom domain integrations.
