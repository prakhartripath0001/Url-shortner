# application-dev.properties
# Local development overrides — DO NOT commit secrets here
# Copy this file and fill in your local values

# MySQL (local dev database)
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123

# JPA - show SQL in dev for debugging
spring.jpa.show-sql=true

# JWT - use a strong random value locally
jwt.secret=YOUR_DEV_SECRET_MIN_32_CHARS_REPLACE_THIS

# Server
server.port=8082
