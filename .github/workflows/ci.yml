name: CI — Build, Test & Docker

# ─── TRIGGER CONDITIONS ────────────────────────────────────────────────────────
# Run on every push to main/develop AND every pull request targeting these branches
# This ensures:
# - main: always deployable (protected branch)
# - develop: integration branch, tests run before merge
# - PRs: must pass CI before merge is allowed (branch protection rule)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ─── GLOBAL ENVIRONMENT ────────────────────────────────────────────────────────
env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/shortify

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  #  JOB 1: Test Auth Service
  #  WHY: Catch regressions early. Tests run before Docker build (fail fast).
  # ═══════════════════════════════════════════════════════════════════════════
  test-auth-service:
    name: "Test: auth-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/auth-service

    # Service containers: spin up real dependencies for integration tests
    # Testcontainers would also work but GH Actions service containers are faster
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven  # Cache ~/.m2 — dramatically speeds up subsequent runs

      - name: Run tests
        run: ./mvnw verify -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/auth_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret-must-be-at-least-32-chars-long

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()  # Upload even on failure so we can inspect failures
        with:
          name: auth-service-test-results
          path: backend/services/auth-service/target/surefire-reports/

  # ═══════════════════════════════════════════════════════════════════════════
  #  JOB 2: Test URL Service
  # ═══════════════════════════════════════════════════════════════════════════
  test-url-service:
    name: "Test: url-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/url-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: url_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw verify -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/url_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-must-be-at-least-32-chars-long
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092  # Testcontainers handles Kafka in tests

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: url-service-test-results
          path: backend/services/url-service/target/surefire-reports/

  # ═══════════════════════════════════════════════════════════════════════════
  #  JOB 3: Frontend Tests & Build
  # ═══════════════════════════════════════════════════════════════════════════
  test-frontend:
    name: "Test: frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint
        run: npm run lint

      - name: Build (verify no compile errors)
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  #  JOB 3a: Test Analytics Service
  # ═══════════════════════════════════════════════════════════════════════════
  test-analytics-service:
    name: "Test: analytics-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/analytics-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests (compile verify)
        run: ./mvnw verify -B

  # ═══════════════════════════════════════════════════════════════════════════
  #  JOB 3b: Test Payment Service
  # ═══════════════════════════════════════════════════════════════════════════
  test-payment-service:
    name: "Test: payment-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/payment-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests (compile verify)
        run: ./mvnw verify -B
        env:
          JWT_SECRET: test-secret-must-be-at-least-32-chars-long

  # ═══════════════════════════════════════════════════════════════════════════
  #  JOB 3c: Test Notification Service
  # ═══════════════════════════════════════════════════════════════════════════
  test-notification-service:
    name: "Test: notification-service"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests (compile verify)
        run: ./mvnw verify -B

  # ═══════════════════════════════════════════════════════════════════════════
  #  JOB 4: Build & Push Docker Images
  #  Only runs on push to main/develop (not on PRs — save registry space)
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build-push:
    name: "Docker: Build & Push"
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-url-service, test-analytics-service, test-payment-service, test-notification-service, test-frontend]
    if: github.event_name == 'push'  # Don't build Docker on PRs

    permissions:
      contents: read
      packages: write  # Needed to push to GitHub Container Registry (ghcr.io)

    strategy:
      matrix:
        service:
          - name: auth-service
            context: backend/services/auth-service
          - name: url-service
            context: backend/services/url-service
          - name: analytics-service
            context: backend/services/analytics-service
          - name: payment-service
            context: backend/services/payment-service
          - name: notification-service
            context: backend/services/notification-service
          - name: frontend
            context: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub Actions

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables: multi-platform builds, better layer caching

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha  # GitHub Actions cache for Docker layers
          cache-to: type=gha,mode=max
